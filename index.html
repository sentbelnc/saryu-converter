<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>센트비 사규 변환기</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:#F5F4F0;color:#1A1916;min-height:100vh}
header{background:#1A3A6B;padding:0 2rem;height:58px;display:flex;align-items:center;justify-content:space-between}
.logo{font-size:15px;font-weight:700;color:#fff;display:flex;align-items:center;gap:8px}
.logo-s{width:26px;height:26px;background:rgba(255,255,255,0.2);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff}
.badge{font-size:11px;padding:3px 10px;border-radius:20px;background:rgba(255,255,255,0.15);color:rgba(255,255,255,0.8)}
main{max-width:620px;margin:0 auto;padding:2.5rem 1.5rem 4rem}
h1{font-size:24px;font-weight:700;letter-spacing:-0.03em;line-height:1.3;margin-bottom:8px}
.sub{font-size:14px;color:#6B6860;line-height:1.7;margin-bottom:2rem}
.card{background:#fff;border:1px solid #E2DED6;border-radius:14px;padding:1.25rem 1.5rem;margin-bottom:1rem}
.clabel{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:#9C9A94;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.dot{width:20px;height:20px;border-radius:50%;background:#1A3A6B;color:#fff;font-size:10px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}
.dot.ok{background:#1D6A4A}
.uzone{border:1.5px dashed #C8C4BC;border-radius:10px;padding:1.5rem;text-align:center;cursor:pointer;transition:all .15s;position:relative;background:#F0EEE9}
.uzone:hover{border-color:#1A3A6B;background:#E8EEF8}
.uzone.ok{border-style:solid;border-color:#A8D9BC;background:#EAF5EE}
.uzone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.uzone-icon{font-size:24px;margin-bottom:6px}
.uzone-t{font-size:14px;font-weight:500;margin-bottom:3px}
.uzone-s{font-size:12px;color:#9C9A94}
.fok{display:none;align-items:center;justify-content:center;gap:6px;font-size:13px;font-weight:500;color:#1D6A4A;margin-top:8px}
.fok.show{display:flex}
hr{border:none;border-top:1px solid #E2DED6;margin:1.25rem 0}
.btn{width:100%;padding:14px;font-size:15px;font-weight:700;font-family:'Noto Sans KR',sans-serif;background:#1A3A6B;color:#fff;border:none;border-radius:10px;cursor:pointer;transition:opacity .15s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn:hover:not(:disabled){opacity:.87}
.btn:disabled{opacity:.3;cursor:not-allowed}
.sbox{display:none;margin-top:1rem;padding:.9rem 1.2rem;border-radius:10px;background:#EEF4FB;border:1px solid #B0CCE8;font-size:13px;color:#1A4A7A;align-items:center;gap:10px}
.sbox.show{display:flex}
.spin{width:16px;height:16px;border:2px solid #B0CCE8;border-top-color:#1A4A7A;border-radius:50%;animation:sp .8s linear infinite;flex-shrink:0}
@keyframes sp{to{transform:rotate(360deg)}}
.ebox{display:none;margin-top:1rem;padding:.9rem 1.2rem;border-radius:10px;background:#FDF0F0;border:1px solid #F0B8B8;font-size:13px;color:#8B2E2E}
.ebox.show{display:block}
.scard{display:none;margin-top:1rem;padding:.9rem 1.2rem;border-radius:10px;background:#EAF5EE;border:1px solid #A8D9BC;font-size:13px;color:#1D6A4A;align-items:center;gap:8px}
.scard.show{display:flex}
footer{text-align:center;padding:1.5rem;font-size:12px;color:#9C9A94}
</style>
</head>
<body>
<header>
  <div class="logo"><div class="logo-s">S</div>센트비 사규 변환기</div>
  <span class="badge">사내 전용</span>
</header>
<main>
  <h1>사규 문서를<br>센트비 양식으로 변환</h1>
  <p class="sub">변환할 사규 파일을 올리면 AI가 센트비 표준 양식의 Word 파일로 자동 변환해드려요.</p>

  <div class="card">
    <div class="clabel"><span class="dot ok">1</span>변환할 사규 파일 업로드</div>
    <div class="uzone" id="zone">
      <input type="file" id="file" accept=".docx,.pdf" onchange="handleFile(this)"/>
      <div class="uzone-icon">📄</div>
      <div class="uzone-t">클릭해서 파일 선택</div>
      <div class="uzone-s">.docx 또는 .pdf</div>
    </div>
    <div class="fok" id="fok">✅ <span id="fname"></span></div>
  </div>

  <hr/>
  <button class="btn" id="btn" disabled onclick="convert()">✨ 센트비 양식 Word 파일로 변환하기</button>
  <div class="sbox" id="sbox"><div class="spin"></div><span>AI가 변환 중입니다… 30초~1분 소요</span></div>
  <div class="ebox" id="ebox"></div>
  <div class="scard" id="scard">✅ 변환 완료! Word 파일이 자동으로 다운로드됐어요.</div>
</main>
<footer>주식회사 센트비 · 사내 전용</footer>

<script>
function handleFile(inp) {
  const file = inp.files[0]; if (!file) return;
  document.getElementById('zone').classList.add('ok');
  document.getElementById('fok').classList.add('show');
  document.getElementById('fname').textContent = file.name;
  document.getElementById('btn').disabled = false;
}

async function convert() {
  const sbox=document.getElementById('sbox'), ebox=document.getElementById('ebox'),
        scard=document.getElementById('scard'), btn=document.getElementById('btn');
  ebox.className='ebox'; scard.className='scard';
  sbox.className='sbox show'; btn.disabled=true;
  try {
    const fd = new FormData();
    fd.append('file', document.getElementById('file').files[0]);
    const resp = await fetch('/convert', { method: 'POST', body: fd });
    
    const contentType = resp.headers.get('content-type') || '';
    if (!resp.ok || contentType.includes('application/json')) {
      const data = await resp.json();
      throw new Error(data.error || '서버 오류');
    }
    
    const blob = await resp.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = '센트비_사규_' + new Date().toISOString().slice(0,10) + '.docx';
    a.click();
    URL.revokeObjectURL(url);
    scard.className='scard show'; sbox.className='sbox';
  } catch(e) {
    sbox.className='sbox'; ebox.className='ebox show';
    ebox.textContent='❌ 오류: '+e.message;
  } finally { btn.disabled=false; }
}
</script>
</body>
</html>
